<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin - Secret Blogs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .blog-container { max-width: 800px; margin: 4rem auto; padding: 2rem; background: var(--bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .blog-form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3rem; }
        .blog-form input, .blog-form textarea { padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1rem; background: var(--bg); color: var(--primary); }
        .blog-form textarea { min-height: 150px; resize: vertical; }
        .blog-post { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
        .blog-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.5rem; }
        .blog-meta { font-size: 0.9rem; color: var(--secondary); margin-bottom: 1rem; }
        .blog-content { line-height: 1.7; white-space: pre-wrap; }
        .btn-submit { align-self: flex-start; padding: 0.8rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div id="main-content" class="blog-container">
        <h1 style="color: var(--primary); margin-bottom: 2rem;">Secret Blog Submissions</h1>
        <p style="margin-bottom: 2rem; color: var(--secondary);">Note: Since this is a static site without a backend, blogs submitted here are temporarily saved to your browser's local storage. This means only you can see what you post here, unless a database (like Firebase) is integrated later.</p>
        
        <form class="blog-form" id="blog-form">
            <input type="text" id="blog-author" placeholder="Your Name" required>
            <input type="text" id="blog-title" placeholder="Blog Title" required>
            <textarea id="blog-content" placeholder="Write your blog post here..." required></textarea>
            <button type="submit" class="btn-submit">Post Blog</button>
        </form>

        <h2 style="color: var(--primary); margin-bottom: 1.5rem;">Submitted Blogs</h2>
        <div id="blogs-list">
            <!-- Blogs will be injected here by JS -->
        </div>
    </div>

    <script src="blogs.js"></script>
</body>
</html>
