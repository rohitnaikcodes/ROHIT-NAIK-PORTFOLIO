    <style>
        /* ========== BLOG PAGE STYLES ========== */
        .blog-page {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px 60px;
            min-height: 100vh;
        }

        /* --- Header / Hero --- */
        .blog-header {
            text-align: center;
            padding: 48px 0 40px;
            position: relative;
        }

        .blog-header::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary, #e7a33e), var(--profile-ring-light, #f0c078));
            border-radius: 2px;
            margin: 24px auto 0;
        }

        .blog-header-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary, #4a4a4a);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 24px;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s ease;
            background: var(--bg-secondary, #ebe4ef);
        }

        .blog-header-back:hover {
            color: var(--text-primary, #1a1a1a);
            transform: translateX(-2px);
        }

        .blog-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-primary, #1a1a1a);
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .blog-header p {
            font-size: 1.05rem;
            color: var(--text-secondary, #4a4a4a);
            line-height: 1.6;
            max-width: 560px;
            margin: 0 auto;
        }

        /* --- Search / Filter Bar --- */
        .blog-search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding: 6px;
            background: var(--bg-secondary, #ebe4ef);
            border-radius: 12px;
            border: 1px solid var(--border-color, #c9b8d1);
            transition: border-color 0.2s;
        }

        .blog-search-bar:focus-within {
            border-color: var(--accent-primary, #e7a33e);
        }

        .blog-search-bar svg {
            margin-left: 12px;
            color: var(--text-muted, #6b6b6b);
            flex-shrink: 0;
        }

        .blog-search-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-primary, #1a1a1a);
            outline: none;
        }

        .blog-search-input::placeholder {
            color: var(--text-muted, #6b6b6b);
        }

        .blog-count {
            font-size: 0.8rem;
            color: var(--text-muted, #6b6b6b);
            padding-right: 14px;
            white-space: nowrap;
            font-weight: 500;
        }

        /* --- Blog Grid --- */
        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Blog Card --- */
        .blog-card {
            background: var(--bg-secondary, #ebe4ef);
            border: 1px solid var(--border-color, #c9b8d1);
            border-radius: 16px;
            padding: 28px 28px 24px;
            transition: all 0.25s ease;
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-primary, #e7a33e), var(--profile-ring-light, #f0c078));
            border-radius: 4px 0 0 4px;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .blog-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg, 0 10px 15px -3px rgba(0, 0, 0, 0.15));
        }

        .blog-card:hover::before {
            opacity: 1;
        }

        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .blog-card-author {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-primary, #e7a33e);
            background: rgba(231, 163, 62, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .blog-card-date {
            font-size: 0.8rem;
            color: var(--text-muted, #6b6b6b);
            font-weight: 500;
        }

        .blog-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary, #1a1a1a);
            line-height: 1.35;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .blog-card-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 14px;
            object-fit: cover;
            max-height: 300px;
        }

        .blog-card-body {
            font-size: 0.925rem;
            color: var(--text-secondary, #4a4a4a);
            line-height: 1.75;
        }

        .blog-card-body p {
            margin-bottom: 0.75em;
        }

        .blog-card-body strong {
            color: var(--text-primary, #1a1a1a);
            font-weight: 600;
        }

        .blog-card-body ul, .blog-card-body ol {
            padding-left: 1.5em;
            margin-bottom: 0.75em;
        }

        /* --- Read More toggle --- */
        .blog-card-body.collapsed {
            max-height: 160px;
            overflow: hidden;
            position: relative;
        }

        .blog-card-body.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, var(--bg-secondary, #ebe4ef));
            pointer-events: none;
        }

        .read-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            background: none;
            border: none;
            color: var(--accent-primary, #e7a33e);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
            transition: color 0.2s;
        }

        .read-more-btn:hover {
            color: var(--text-primary, #1a1a1a);
        }

        /* --- Empty State --- */
        .blog-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted, #6b6b6b);
        }

        .blog-empty svg {
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* --- Loading Skeleton --- */
        .blog-skeleton {
            background: var(--bg-secondary, #ebe4ef);
            border: 1px solid var(--border-color, #c9b8d1);
            border-radius: 16px;
            padding: 28px;
            animation: skeleton-pulse 1.5s ease infinite;
        }

        .skeleton-line {
            height: 14px;
            background: var(--border-color, #c9b8d1);
            border-radius: 6px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.long { width: 100%; }
        .skeleton-line.title { height: 22px; width: 80%; margin-bottom: 16px; }

        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* --- Admin Form (hidden by default, toggled via secret) --- */
        .blog-admin-panel {
            display: none;
            margin-bottom: 40px;
            padding: 28px;
            background: var(--bg-secondary, #ebe4ef);
            border: 2px dashed var(--border-color, #c9b8d1);
            border-radius: 16px;
        }

        .blog-admin-panel.visible {
            display: block;
        }

        .blog-admin-panel h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary, #1a1a1a);
            margin-bottom: 16px;
        }

        .blog-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .blog-form input,
        .blog-form textarea {
            padding: 12px 16px;
            border: 1px solid var(--border-color, #c9b8d1);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.925rem;
            background: var(--bg-primary, #f5f0f7);
            color: var(--text-primary, #1a1a1a);
            transition: border-color 0.2s;
            outline: none;
        }

        .blog-form input:focus,
        .blog-form textarea:focus {
            border-color: var(--accent-primary, #e7a33e);
        }

        .blog-form textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        .btn-submit {
            align-self: flex-start;
            padding: 12px 28px;
            background: var(--accent-primary, #e7a33e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.925rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Footer --- */
        .blog-footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid var(--border-color, #c9b8d1);
            margin-top: 48px;
        }

        .blog-footer p {
            font-size: 0.8rem;
            color: var(--text-muted, #6b6b6b);
        }

        .blog-footer a {
            color: var(--accent-primary, #e7a33e);
            text-decoration: none;
            font-weight: 600;
        }

        .blog-footer a:hover {
            text-decoration: underline;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .blog-page {
                padding: 20px 16px 40px;
            }

            .blog-header {
                padding: 32px 0 28px;
            }

            .blog-header h1 {
                font-size: 1.65rem;
            }

            .blog-card {
                padding: 20px 18px 18px;
            }

            .blog-card h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="blog-page">
        <!-- Header -->
        <header class="blog-header">
            <a href="/" class="blog-header-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                Back to Portfolio
            </a>
            <h1>Rohit Naik's Blog</h1>
            <p>Insights on tech, student ambassador programs, and content creation by <strong>Rohit Naik</strong> — Top Google Student Ambassador & MLSA.</p>
        </header>

        <!-- Search Bar -->
        <div class="blog-search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="blog-search-input" id="blog-search" placeholder="Search articles...">
            <span class="blog-count" id="blog-count"></span>
        </div>

        <!-- Admin Panel (hidden, triple-click header to open) -->
        <div class="blog-admin-panel" id="admin-panel">
            <h3>✍️ Compose New Post</h3>
            <form class="blog-form" id="blog-form">
                <input type="text" id="blog-author" placeholder="Author name" required>
                <input type="text" id="blog-title" placeholder="Blog title" required>
                <textarea id="blog-content" placeholder="Write your blog (Markdown supported: **bold**, *italics*, lists...)" required></textarea>
                <label style="color: var(--text-muted); font-size: 0.8rem;">Attach an image (optional):</label>
                <input type="file" id="blog-image" accept="image/*" style="border: none; padding: 0; font-size: 0.85rem;">
                <button type="submit" class="btn-submit">Publish Post</button>
            </form>
        </div>

        <!-- Blog List -->
        <div class="blog-grid" id="blogs-list">
            <!-- Loading Skeleton -->
            <div class="blog-skeleton">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line title"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line long"></div>
            </div>
            <div class="blog-skeleton">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line title"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="blog-footer">
            <p>© 2026 <a href="/">Rohit Naik</a> · Top Google Student Ambassador · Top MLSA · Content Creator</p>
        </footer>
    </div>

    <!-- Admin Panel Toggle: triple-click on the header -->
    <script>
        let clickCount = 0;
        let clickTimer = null;
        document.querySelector('.blog-header h1').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 500);
            if (clickCount >= 3) {
                document.getElementById('admin-panel').classList.toggle('visible');
                clickCount = 0;
            }
        });

        // Apply daily theme
        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        document.body.setAttribute('data-day', days[new Date().getDay()]);

        // Respect saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="blogs.js"></script>
</body>
